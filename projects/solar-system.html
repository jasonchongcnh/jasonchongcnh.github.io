<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexagonal honeycomb one-stroke problem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
        }
        label, input, button {
            margin: 5px;
            padding: 8px;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #hexagonGrid {
            margin: 20px auto;
            position: relative;
        }
        .stats {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        canvas {
            border: 1px solid #ddd;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hexagonal honeycomb one-stroke problem</h1>
        
        <div class="controls">
            <label for="hexagonCount">Number of hexagons:</label>
            <input type="number" id="hexagonCount" min="1" max="20" value="7">
            <button id="generateBtn">Generate a honeycomb</button>
            <button id="solveBtn">Find a stroke path</button>
            <button id="clearBtn">Clear</button>
        </div>
        
        <div id="hexagonGrid">
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="stats">
            <p id="pathCount">Number of unique connection paths: 0</p>
            <p id="pathInfo">Path information: Not yet calculated</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let hexagons = [];
        let edges = [];
        let graph = {};
        let paths = [];
        
        // 設置畫布大小
        function resizeCanvas() {
            const container = document.getElementById('hexagonGrid');
            const containerWidth = container.clientWidth || window.innerWidth * 0.8;
            const aspectRatio = 3/4; // 保持4:3的比例
            
            // 設置最大寬度，避免畫布過大
            const maxWidth = Math.min(containerWidth, window.innerWidth * 0.8);
            const maxHeight = window.innerHeight * 0.6;
            
            // 計算等比例尺寸
            let width = maxWidth;
            let height = width * aspectRatio;
            
            // 確保高度不超過最大高度
            if (height > maxHeight) {
                height = maxHeight;
                width = height / aspectRatio;
            }
            
            // 設置畫布尺寸
            canvas.width = width;
            canvas.height = height;
            
            // 如果已經有六邊形，重新繪製
            if (hexagons.length > 0) {
                drawHexagonGrid();
            }
        }
        
        class Hexagon {
            constructor(id, centerX, centerY, size) {
                this.id = id;
                this.centerX = centerX;
                this.centerY = centerY;
                this.size = size;
                this.vertices = this.calculateVertices();
                this.edges = this.calculateEdges();
                this.enabled = true; // 默認為啟用狀態
            }
            
            calculateVertices() {
                const vertices = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i - Math.PI / 6;
                    const x = this.centerX + this.size * Math.cos(angle);
                    const y = this.centerY + this.size * Math.sin(angle);
                    vertices.push({ x, y });
                }
                return vertices;
            }
            
            calculateEdges() {
                const edges = [];
                for (let i = 0; i < 6; i++) {
                    const start = this.vertices[i];
                    const end = this.vertices[(i + 1) % 6];
                    edges.push({ start, end, hexId: this.id, edgeId: i });
                }
                return edges;
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for (let i = 1; i < 6; i++) {
                    ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                }
                ctx.closePath();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 根據啟用狀態填充不同顏色
                if (this.enabled) {
                    ctx.fillStyle = 'rgba(144, 238, 144, 0.5)'; // 淺綠色表示啟用
                    ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(211, 211, 211, 0.3)'; // 淺灰色表示禁用
                    ctx.fill();
                }
                
                ctx.fillStyle = '#666';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`ID: ${this.id}`, this.centerX, this.centerY - this.size * 0.6);
            }
            
            // 檢查點擊是否在六邊形內
            containsPoint(x, y) {
                let inside = false;
                const vertices = this.vertices;
                
                for (let i = 0, j = vertices.length - 1; i < vertices.length; j = i++) {
                    const xi = vertices[i].x, yi = vertices[i].y;
                    const xj = vertices[j].x, yj = vertices[j].y;
                    
                    const intersect = ((yi > y) !== (yj > y))
                        && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                
                return inside;
            }
            
            // 切換啟用/禁用狀態
            toggleEnabled() {
                this.enabled = !this.enabled;
            }
        }
        
        class Edge {
            constructor(id, start, end, hexId1, edgeId1, hexId2 = null, edgeId2 = null) {
                this.id = id;
                this.start = start;
                this.end = end;
                this.hexId1 = hexId1;
                this.edgeId1 = edgeId1;
                this.hexId2 = hexId2;
                this.edgeId2 = edgeId2;
                this.visited = false;
            }
            
            draw(color = '#333', width = 2) {
                ctx.beginPath();
                ctx.moveTo(this.start.x, this.start.y);
                ctx.lineTo(this.end.x, this.end.y);
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.stroke();
            }
            
            isShared() {
                return this.hexId2 !== null;
            }
        }
        
        function generateHexagonGrid(count) {
            hexagons = [];
            edges = [];
            graph = {};
            paths = [];
            
            const hexSize = 50;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Create center hexagon
            const centerHex = new Hexagon(1, centerX, centerY, hexSize);
            hexagons.push(centerHex);
            
            if (count === 1) {
                processEdges();
                return;
            }
            
            // Use axial coordinates for proper hexagon grid placement
            const hexPositions = [[0, 0]]; // Center hexagon at (0,0)
            const positionSet = new Set(['0,0']);
            let currentId = 2;
            
            // Directions for the 6 neighboring positions
            const directions = [
                [1, 0],   // Right
                [1, -1],  // Top-right
                [0, -1],  // Top-left
                [-1, 0],  // Left
                [-1, 1],  // Bottom-left
                [0, 1]    // Bottom-right
            ];
            
            // Build honeycomb layer by layer
            while (currentId <= count) {
                let addedInThisRound = false;
                
                // Find all candidate positions adjacent to existing hexagons
                const candidates = [];
                
                for (const [q, r] of hexPositions) {
                    for (const [dq, dr] of directions) {
                        const newQ = q + dq;
                        const newR = r + dr;
                        const key = `${newQ},${newR}`;
                        
                        if (!positionSet.has(key)) {
                            // Count how many existing neighbors this position has
                            let neighborCount = 0;
                            for (const [dq2, dr2] of directions) {
                                const checkKey = `${newQ + dq2},${newR + dr2}`;
                                if (positionSet.has(checkKey)) {
                                    neighborCount++;
                                }
                            }
                            
                            // Only consider positions with 2+ neighbors for proper honeycomb structure
                            if (neighborCount >= 2) {
                                candidates.push({
                                    pos: [newQ, newR],
                                    key: key,
                                    neighbors: neighborCount
                                });
                            }
                        }
                    }
                }
                
                // If no candidates with 2+ neighbors, allow 1 neighbor (for sparse configurations)
                if (candidates.length === 0) {
                    for (const [q, r] of hexPositions) {
                        for (const [dq, dr] of directions) {
                            const newQ = q + dq;
                            const newR = r + dr;
                            const key = `${newQ},${newR}`;
                            
                            if (!positionSet.has(key)) {
                                let neighborCount = 0;
                                for (const [dq2, dr2] of directions) {
                                    const checkKey = `${newQ + dq2},${newR + dr2}`;
                                    if (positionSet.has(checkKey)) {
                                        neighborCount++;
                                    }
                                }
                                
                                if (neighborCount >= 1) {
                                    candidates.push({
                                        pos: [newQ, newR],
                                        key: key,
                                        neighbors: neighborCount
                                    });
                                }
                            }
                        }
                    }
                }
                
                // Remove duplicates and sort by neighbor count (descending) and distance from center
                const uniqueCandidates = [];
                const seenKeys = new Set();
                
                for (const candidate of candidates) {
                    if (!seenKeys.has(candidate.key)) {
                        seenKeys.add(candidate.key);
                        uniqueCandidates.push(candidate);
                    }
                }
                
                uniqueCandidates.sort((a, b) => {
                    if (b.neighbors !== a.neighbors) {
                        return b.neighbors - a.neighbors;
                    }
                    const distA = a.pos[0] * a.pos[0] + a.pos[1] * a.pos[1] + a.pos[0] * a.pos[1];
                    const distB = b.pos[0] * b.pos[0] + b.pos[1] * b.pos[1] + b.pos[0] * b.pos[1];
                    return distA - distB;
                });
                
                // Add the best candidate
                if (uniqueCandidates.length > 0 && currentId <= count) {
                    const best = uniqueCandidates[0];
                    hexPositions.push(best.pos);
                    positionSet.add(best.key);
                    currentId++;
                    addedInThisRound = true;
                }
                
                // Safety check to prevent infinite loop
                if (!addedInThisRound) {
                    break;
                }
            }
            
            // Convert axial coordinates to pixel positions
            // For flat-top hexagons that share edges perfectly
            const hexWidth = hexSize * Math.sqrt(3);
            const hexHeight = hexSize * 1.5;
            
            for (let i = 1; i < hexPositions.length; i++) {
                const [q, r] = hexPositions[i];
                const x = centerX + hexWidth * (q + r * 0.5);
                const y = centerY + hexHeight * r;
                
                const hex = new Hexagon(i + 1, x, y, hexSize);
                hexagons.push(hex);
            }
            
            processEdges();
        }
        
        function processEdges() {
            let allEdges = [];
            hexagons.forEach(hex => {
                hex.edges.forEach((edge, idx) => {
                    allEdges.push({
                        start: edge.start,
                        end: edge.end,
                        hexId: hex.id,
                        edgeId: idx
                    });
                });
            });
            
            let edgeId = 0;
            const tolerance = 1.0; // Increased tolerance for matching edges
            
            while (allEdges.length > 0) {
                const currentEdge = allEdges.shift();
                
                const matchIndex = allEdges.findIndex(e => 
                    (Math.abs(e.start.x - currentEdge.end.x) < tolerance && 
                     Math.abs(e.start.y - currentEdge.end.y) < tolerance &&
                     Math.abs(e.end.x - currentEdge.start.x) < tolerance && 
                     Math.abs(e.end.y - currentEdge.start.y) < tolerance)
                );
                
                if (matchIndex !== -1) {
                    const matchedEdge = allEdges.splice(matchIndex, 1)[0];
                    edges.push(new Edge(
                        edgeId++,
                        currentEdge.start,
                        currentEdge.end,
                        currentEdge.hexId,
                        currentEdge.edgeId,
                        matchedEdge.hexId,
                        matchedEdge.edgeId
                    ));
                } else {
                    edges.push(new Edge(
                        edgeId++,
                        currentEdge.start,
                        currentEdge.end,
                        currentEdge.hexId,
                        currentEdge.edgeId
                    ));
                }
            }
            
            buildGraph();
        }
        
        function buildGraph() {
            graph = {};
            
            edges.forEach(edge => {
                const startKey = `${edge.start.x.toFixed(2)},${edge.start.y.toFixed(2)}`;
                const endKey = `${edge.end.x.toFixed(2)},${edge.end.y.toFixed(2)}`;
                
                if (!graph[startKey]) graph[startKey] = [];
                if (!graph[endKey]) graph[endKey] = [];
                
                graph[startKey].push({ vertex: endKey, edge: edge.id });
                graph[endKey].push({ vertex: startKey, edge: edge.id });
            });
        }
        
        function canDrawEulerPath() {
            return hexagons.length > 0;
        }
        
        function findEulerPath() {
            // 獲取啟用的六邊形
            const enabledHexagons = hexagons.filter(hex => hex.enabled);
            
            if (enabledHexagons.length === 0) {
                alert("Please enable at least one hexagon first!");
                return null;
            }
            
            const enabledHexIds = enabledHexagons.map(hex => hex.id);
            const startHexId = enabledHexIds[0];
            
            // 使用深度優先搜索（DFS）回溯法尋找哈密頓迴路
            function solve(currentHexId, visited, path) {
                // 如果所有啟用的六邊形都已訪問
                if (visited.size === enabledHexagons.length) {
                    // 檢查是否可以回到起點形成閉合路徑
                    let canReturn = false;
                    for (const edge of edges) {
                        if ((edge.hexId1 === currentHexId && edge.hexId2 === startHexId) || 
                            (edge.hexId2 === currentHexId && edge.hexId1 === startHexId)) {
                            canReturn = true;
                            break;
                        }
                    }
                    if (canReturn) {
                        return [...path, startHexId]; // 返回六邊形 ID 序列，包含回到的起點
                    }
                    return null;
                }
                
                // 獲取當前六邊形的所有鄰居（且是啟用的且未訪問的）
                const neighbors = [];
                for (const edge of edges) {
                    let nextHexId = null;
                    if (edge.hexId1 === currentHexId && edge.hexId2 !== null && 
                        enabledHexIds.includes(edge.hexId2) && !visited.has(edge.hexId2)) {
                        nextHexId = edge.hexId2;
                    } else if (edge.hexId2 === currentHexId && 
                               enabledHexIds.includes(edge.hexId1) && !visited.has(edge.hexId1)) {
                        nextHexId = edge.hexId1;
                    }
                    
                    if (nextHexId !== null) {
                        neighbors.push(nextHexId);
                    }
                }
                
                // 嘗試每個鄰居
                for (const nextId of neighbors) {
                    visited.add(nextId);
                    path.push(nextId);
                    
                    const result = solve(nextId, visited, path);
                    if (result) return result;
                    
                    // 回溯
                    path.pop();
                    visited.delete(nextId);
                }
                
                return null;
            }
            
            const visited = new Set([startHexId]);
            let path = solve(startHexId, visited, [startHexId]);
            
            // 如果找不到閉合路徑，嘗試尋找開放路徑（不一定要回到起點）
            if (!path) {
                // 嘗試從每個可能的起點開始尋找開放路徑
                for (const sId of enabledHexIds) {
                    const v = new Set([sId]);
                    const p = solveOpenPath(sId, v, [sId], enabledHexagons.length, enabledHexIds);
                    if (p) return p;
                }
            }
            
            return path;
        }
        
        // 尋找開放路徑的輔助函數
        function solveOpenPath(currentHexId, visited, path, targetCount, enabledHexIds) {
            if (visited.size === targetCount) {
                return path;
            }
            
            const neighbors = [];
            for (const edge of edges) {
                let nextHexId = null;
                if (edge.hexId1 === currentHexId && edge.hexId2 !== null && 
                    enabledHexIds.includes(edge.hexId2) && !visited.has(edge.hexId2)) {
                    nextHexId = edge.hexId2;
                } else if (edge.hexId2 === currentHexId && 
                           enabledHexIds.includes(edge.hexId1) && !visited.has(edge.hexId1)) {
                    nextHexId = edge.hexId1;
                }
                if (nextHexId !== null) {
                    neighbors.push(nextHexId);
                }
            }

            for (const nextId of neighbors) {
                visited.add(nextId);
                path.push(nextId);
                const result = solveOpenPath(nextId, visited, path, targetCount, enabledHexIds);
                if (result) return result;
                path.pop();
                visited.delete(nextId);
            }
            return null;
        }
        
        function countUniquePaths() {
            return Math.max(0, hexagons.length - 1);
        }
        
        function drawHexagonGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hexagons.forEach(hex => hex.draw());
        }
        
        function drawEulerPath(path) {
            if (!path || path.length < 2) {
                if (!path) {
                    ctx.fillStyle = 'red';
                    ctx.font = '24px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('無法找到一筆畫路徑！', canvas.width / 2, canvas.height / 2);
                }
                return;
            }

            // 繪製箭頭的輔助函數
            function drawArrow(fromX, fromY, toX, toY, color) {
                const headLength = 15;
                const dx = toX - fromX;
                const dy = toY - fromY;
                const angle = Math.atan2(dy, dx);
                
                // 在路徑中間偏後一點的位置繪製箭頭
                const arrowX = fromX + dx * 0.7;
                const arrowY = fromY + dy * 0.7;

                ctx.beginPath();
                ctx.moveTo(arrowX, arrowY);
                ctx.lineTo(arrowX - headLength * Math.cos(angle - Math.PI / 6), arrowY - headLength * Math.sin(angle - Math.PI / 6));
                ctx.moveTo(arrowX, arrowY);
                ctx.lineTo(arrowX - headLength * Math.cos(angle + Math.PI / 6), arrowY - headLength * Math.sin(angle + Math.PI / 6));
                
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            let delay = 0;
            const animationStep = 100;

            // 繪製路徑
            for (let i = 0; i < path.length - 1; i++) {
                setTimeout(() => {
                    const hex1 = hexagons.find(h => h.id === path[i]);
                    const hex2 = hexagons.find(h => h.id === path[i+1]);
                    
                    if (hex1 && hex2) {
                        const hue = (i * 360 / path.length) % 360;
                        const color = `hsl(${hue}, 100%, 50%)`;

                        // 繪製連接線
                        ctx.beginPath();
                        ctx.moveTo(hex1.centerX, hex1.centerY);
                        ctx.lineTo(hex2.centerX, hex2.centerY);
                        
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 5;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.stroke();

                        // 繪製方向箭頭
                        drawArrow(hex1.centerX, hex1.centerY, hex2.centerX, hex2.centerY, color);

                        // --- 確保圓圈與序號繪製在最上層 ---
                        
                        // 繪製點 (起點/當前點)
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(hex1.centerX, hex1.centerY, 20, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        // 繪製序號
                        ctx.fillStyle = '#333';
                        ctx.font = 'bold 12px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(`S:${i + 1}`, hex1.centerX, hex1.centerY);

                        // 如果是最後一段，也要繪製最後一個點
                        if (i === path.length - 2) {
                            ctx.fillStyle = 'white';
                            ctx.beginPath();
                            ctx.arc(hex2.centerX, hex2.centerY, 20, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.strokeStyle = '#333';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                            
                            ctx.fillStyle = '#333';
                            // 如果回到起點，顯示組合序號（如 S:1/8）
                            if (path[0] === path[path.length - 1]) {
                                ctx.fillText(`S:1/${i + 2}`, hex2.centerX, hex2.centerY);
                            } else {
                                ctx.fillText(`S:${i + 2}`, hex2.centerX, hex2.centerY);
                            }
                        }
                    }
                }, delay);
                
                delay += animationStep;
            }
        }
        
        document.getElementById('generateBtn').addEventListener('click', function() {
            const count = parseInt(document.getElementById('hexagonCount').value);
            if (count < 1 || count > 20) {
                alert('Please enter number between 1 to 20!');
                return;
            }
            
            generateHexagonGrid(count);
            drawHexagonGrid();
            
            document.getElementById('pathCount').textContent = `Number of unique connection paths: ${countUniquePaths()}`;
            document.getElementById('pathInfo').textContent = `Path information: ${canDrawEulerPath() ? 'Can draw connecting path' : "Can't draw path"}`;
        });
        
        document.getElementById('solveBtn').addEventListener('click', function() {
            if (hexagons.length === 0) {
                alert('Please generate honeycomb first!');
                return;
            }
            
            const enabledHexagons = hexagons.filter(hex => hex.enabled);
            if (enabledHexagons.length === 0) {
                alert('Please enable at least one hexagon by clicking on it!');
                return;
            }
            
            const path = findEulerPath();
            if (path) {
                drawHexagonGrid();
                drawEulerPath(path);
                document.getElementById('pathInfo').textContent = `Path information: All enabled hexagons are connected`;
            }
        });
        
        document.getElementById('clearBtn').addEventListener('click', function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hexagons = [];
            edges = [];
            graph = {};
            paths = [];
            
            document.getElementById('pathCount').textContent = 'Number of unique connection paths: 0';
            document.getElementById('pathInfo').textContent = 'Path information: Not yet calculated';
        });
        
        // 添加畫布點擊事件處理
        canvas.addEventListener('click', function(event) {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            // 檢查點擊是否在任何六邊形內
            for (const hex of hexagons) {
                if (hex.containsPoint(x, y)) {
                    hex.toggleEnabled();
                    drawHexagonGrid(); // 重繪六邊形網格
                    
                    // 更新路徑信息
                    const enabledCount = hexagons.filter(h => h.enabled).length;
                    document.getElementById('pathCount').textContent = `Number of enabled hexagons: ${enabledCount}`;
                    document.getElementById('pathInfo').textContent = enabledCount > 0 ? 
                        'Path information: Click "Find a stroke path" to calculate' : 
                        'Path information: No hexagons enabled';
                    break;
                }
            }
        });
        
        // 添加窗口調整事件處理
        window.addEventListener('resize', function() {
            resizeCanvas();
        });
        
        window.onload = function() {
            // 初始化畫布大小
            resizeCanvas();
            
            generateHexagonGrid(7);
            drawHexagonGrid();
            
            document.getElementById('pathCount').textContent = `Number of enabled hexagons: 0`;
            document.getElementById('pathInfo').textContent = `Path information: Click on hexagons to enable them`;
        };
    </script>
</body>
</html>
